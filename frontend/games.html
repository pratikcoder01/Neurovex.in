<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurovex Games | AI-BCI</title>

    <link href="./stitch/css/stitch-base.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./stitch/js/stitch-theme.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body class="bg-background-light font-display text-slate-800 h-screen flex flex-col overflow-hidden antialiased">

    <!-- Header -->
    <header
        class="bg-surface-light border-b border-slate-200 h-16 flex items-center justify-between px-6 flex-shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer group" onclick="window.location.href='index.html'">
            <img src="./assets/images/logo.jpeg" alt="Logo"
                class="w-9 h-9 rounded-lg object-contain bg-white p-0.5 shadow-sm group-hover:scale-105 transition-transform">
            <span
                class="font-bold text-xl tracking-tight text-slate-900 group-hover:text-primary transition-colors">Neurovex</span>
            <div class="h-6 w-px bg-slate-200 mx-2"></div>
            <div class="text-sm font-medium text-slate-500">Brain Games</div>
        </div>

        <div class="flex items-center gap-4">
            <div class="bg-slate-100 rounded-lg px-3 py-1.5 flex items-center gap-2 border border-slate-200">
                <span id="hw-status-indicator" class="w-2 h-2 rounded-full bg-slate-400"></span>
                <span id="hw-status-text" class="text-xs font-mono font-bold text-slate-500">OFFLINE</span>
            </div>

            <button id="connect-hw-btn"
                class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow-sm flex items-center gap-2 transition-all">
                <span class="material-icons">cable</span> Connect ESP32
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-80 bg-surface-light border-r border-slate-200 p-6 flex flex-col z-10 overflow-y-auto">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Game Selection</h3>

            <div class="space-y-4">
                <!-- Game 1: Mind Control -->
                <button
                    class="w-full text-left p-4 rounded-xl border border-primary bg-primary/5 transition-all focus:outline-none">
                    <div class="flex items-start gap-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 shrink-0">
                            <span class="material-icons text-xl">open_with</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-900 leading-tight">Telekinesis</h4>
                            <p class="text-xs text-slate-500 mt-1">Move objects using sheer focus. Powered by sustained
                                Beta waves.</p>
                        </div>
                    </div>
                </button>

                <!-- Game 2: Pattern Match -->
                <button
                    class="w-full text-left p-4 rounded-xl border border-slate-200 bg-white hover:border-emerald-500 hover:bg-emerald-50 transition-all focus:outline-none opacity-60">
                    <div class="flex items-start gap-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-600 shrink-0">
                            <span class="material-icons text-xl">psychology</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-900 leading-tight">Zen Match</h4>
                            <p class="text-xs text-slate-500 mt-1">Unlock patterns via Deep Relaxation (Alpha waves).
                            </p>
                        </div>
                    </div>
                </button>

                <!-- Game 3: Reaction Time -->
                <button
                    class="w-full text-left p-4 rounded-xl border border-slate-200 bg-white hover:border-amber-500 hover:bg-amber-50 transition-all focus:outline-none opacity-60">
                    <div class="flex items-start gap-4">
                        <div
                            class="w-10 h-10 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600 shrink-0">
                            <span class="material-icons text-xl">bolt</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-900 leading-tight">Beta Reflex</h4>
                            <p class="text-xs text-slate-500 mt-1">Train your neurological reaction time to visual cues.
                            </p>
                        </div>
                    </div>
                </button>
            </div>

            <div class="mt-auto">
                <div class="p-4 bg-slate-900 rounded-xl text-white">
                    <div class="text-[10px] font-mono text-slate-400 mb-1 uppercase tracking-wider">Live Signal Focus
                    </div>
                    <div class="flex items-end justify-between">
                        <div class="text-3xl font-bold font-mono tracking-tighter" id="hub-focus">--%</div>
                        <div class="text-xs text-emerald-400 font-mono mb-1" id="hub-state">Waiting...</div>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-1 mt-3 overflow-hidden">
                        <div class="bg-primary h-1 transition-all duration-300" id="hub-focus-bar" style="width: 0%">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Game Area -->
        <section class="flex-1 bg-slate-50 relative overflow-hidden flex flex-col">
            <div class="absolute inset-0 z-0 opacity-[0.03]"
                style="background-image: radial-gradient(circle at 2px 2px, currentColor 1px, transparent 0); background-size: 32px 32px;">
            </div>

            <div class="flex-1 flex flex-col p-8 relative z-10">
                <div class="flex justify-between items-center mb-12">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900">Telekinesis Arena</h2>
                        <p class="text-slate-500">Focus your mind entirely on the cube to move it forward.</p>
                    </div>
                    <button id="start-game-btn"
                        class="bg-slate-900 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-slate-800 transition-colors pointer-events-none opacity-50">
                        Signal Required
                    </button>
                </div>

                <!-- Arena -->
                <div
                    class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden flex items-center px-12">

                    <!-- Track -->
                    <div class="absolute left-12 right-12 h-2 bg-slate-100 rounded-full"></div>
                    <div class="absolute right-12 top-0 bottom-0 w-px bg-emerald-500 border-r border-dashed border-emerald-400"
                        style="left: 80%"></div>
                    <div class="absolute text-emerald-600 font-mono text-xs font-bold pt-4"
                        style="left: 80%; top: 50%;">FINISH LINE</div>

                    <!-- Object to move -->
                    <div id="game-object"
                        class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl shadow-lg shadow-blue-500/30 flex items-center justify-center text-white relative z-10 transition-transform duration-75 ease-linear"
                        style="transform: translateX(0px);">
                        <span class="material-icons opacity-75">category</span>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { SerialEngine } from './js/serialEngine.js';
        import { SignalProcessor } from './js/signalProcessor.js';
        import { BrainGameEngine } from './js/games/brainGameEngine.js';
        import { MindControlGame } from './js/games/mindControlGame.js';

        // Initialize Core Engines
        const serial = new SerialEngine();
        const processor = new SignalProcessor();
        const engine = new BrainGameEngine();

        let isConnected = false;

        // UI Elements
        const obj = document.getElementById('game-object');
        const startBtn = document.getElementById('start-game-btn');
        const hubFocus = document.getElementById('hub-focus');
        const hubBar = document.getElementById('hub-focus-bar');
        const connectBtn = document.getElementById('connect-hw-btn');

        // Initialize Game 1
        const mindGame = new MindControlGame(engine, obj);

        // Hardware Connect
        connectBtn.addEventListener('click', async () => {
            if (!isConnected) {
                const connected = await serial.connect();
                if (connected) {
                    isConnected = true;
                    connectBtn.innerHTML = '<span class="material-icons">cable</span> Disconnect';
                    connectBtn.classList.replace('bg-primary', 'bg-slate-700');
                    connectBtn.classList.replace('hover:bg-blue-600', 'hover:bg-slate-800');

                    document.getElementById('hw-status-indicator').className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
                    document.getElementById('hw-status-text').innerText = 'STREAMING...';

                    startBtn.classList.remove('pointer-events-none', 'opacity-50');
                    startBtn.innerText = 'Start Level';
                    startBtn.classList.replace('bg-slate-900', 'bg-emerald-600');
                    startBtn.classList.replace('hover:bg-slate-800', 'hover:bg-emerald-700');
                }
            } else {
                await serial.disconnect();
                isConnected = false;
                mindGame.stop();
                obj.style.transform = 'translateX(0px)';

                connectBtn.innerHTML = '<span class="material-icons">cable</span> Connect ESP32';
                connectBtn.classList.replace('bg-slate-700', 'bg-primary');
                connectBtn.classList.replace('hover:bg-slate-800', 'hover:bg-blue-600');

                document.getElementById('hw-status-indicator').className = 'w-2 h-2 rounded-full bg-slate-400';
                document.getElementById('hw-status-text').innerText = 'OFFLINE';

                startBtn.classList.add('pointer-events-none', 'opacity-50');
                startBtn.innerText = 'Signal Required';
                startBtn.classList.replace('bg-emerald-600', 'bg-slate-900');

                hubFocus.innerText = '--%';
                hubBar.style.width = '0%';
            }
        });

        // Game Start Toggle
        let gameRunning = false;
        startBtn.addEventListener('click', () => {
            if (!gameRunning) {
                obj.style.transform = 'translateX(0px)';
                mindGame.position = 0;
                mindGame.start();
                startBtn.innerText = 'End Game';
                startBtn.classList.replace('bg-emerald-600', 'bg-rose-600');
                gameRunning = true;
            } else {
                mindGame.stop();
                startBtn.innerText = 'Start Level';
                startBtn.classList.replace('bg-rose-600', 'bg-emerald-600');
                gameRunning = false;
            }
        });

        // Real-Time Hardware Loop
        serial.onData((data) => {
            processor.feed(data);
            const stats = processor.computeStats();
            if (stats) {
                // Pipe to the game engine
                engine.feedProcessedSignal(stats);
            }
        });

        // Listen to engine output for HUD updates
        engine.on('onFocusChange', (data) => {
            hubFocus.innerText = data.focus + '%';
            hubBar.style.width = data.focus + '%';

            if (data.stress > 70) document.getElementById('hub-state').innerText = 'Stressed';
            else if (data.fatigue > 70) document.getElementById('hub-state').innerText = 'Fatigued';
            else if (data.focus >= 60) document.getElementById('hub-state').innerText = 'Locked In';
            else document.getElementById('hub-state').innerText = 'Drifting';
        });

    </script>
</body>

</html>
