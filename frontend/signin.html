<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Neurovex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="./stitch/css/stitch-variables.css?v=2">

    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-display);
        }


        .signin-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: fadeUp 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .logo-container {
            width: 56px;
            height: 56px;
            background: var(--card-bg);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.4s ease;
        }

        .logo-container:hover {
            box-shadow: var(--shadow-glow);
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 32px 0;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            width: 100%;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            padding: 32px 28px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            box-sizing: border-box;
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            margin-top: 24px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            accent-color: var(--accent-color);
            margin: 0;
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .forgot-link {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.8;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: block;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:hover {
            opacity: 0.9;
            box-shadow: var(--shadow-sm);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider-text {
            padding: 0 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .btn-outline {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: block;
        }

        .btn-outline:hover {
            background: var(--bg-secondary);
        }

        .btn-outline:active {
            transform: scale(0.98);
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: 20px;
        }

        .google-btn:active {
            transform: scale(0.98);
        }

        .google-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--border-color);
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .footer-compliance {
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
        }

        .footer-compliance .material-icons {
            font-size: 14px;
        }
    </style>
</head>

<body>



    <div class="signin-wrapper">
        
        <div class="header-section">
            <div class="logo-container">
                <img src="./assets/images/logo.jpeg" alt="Neurovex Logo">
            </div>

            <h1 class="welcome-text">Welcome back</h1>
            <p class="subtitle">Access your research dashboard</p>
        </div>

        
        <div class="card">
            
            <button type="button" class="google-btn" id="google-signin-btn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>

            
            <div class="divider" style="margin-top: 0; margin-bottom: 24px;">
                <span class="divider-text">Or</span>
            </div>

            <form action="#">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="researcher@institute.edu" required />
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required />
                </div>

                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox-input" />
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot your password?</a>
                </div>

                
                <button type="submit" class="btn-primary" id="email-signin-btn">Sign In to Platform</button>

                
                <div class="divider">
                    <span class="divider-text">New to Neurovex?</span>
                </div>

                
                <button type="button" class="btn-outline" onclick="window.location.href='signup.html'">Create Researcher
                    Account</button>
            </form>
        </div>

        
        <div class="footer-compliance">
            <span class="material-icons">lock</span>
            HIPAA Compliant & End-to-End Encrypted
        </div>

    </div>


    <script type="module">
        import { signInWithGoogle, signIn } from './js/backend/auth.js';

        document.getElementById('google-signin-btn').addEventListener('click', async () => {
            const btn = document.getElementById('google-signin-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Connecting...';
            btn.disabled = true;

            const { data, error } = await signInWithGoogle();

            if (error) {
                alert("Google Sign-In failed: " + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                // Supabase OAuth redirects the page automatically usually
            }
        });

        document.getElementById('email-signin-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('email-signin-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Please enter both email and password");
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = 'Authenticating...';
            btn.disabled = true;

            const { data, error } = await signIn(email, password);

            if (error) {
                alert("Login failed: " + error.message);
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>

</html>
