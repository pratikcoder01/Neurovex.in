<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Neurovex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            /* Light gray background matching the screenshot exactly */
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
        }

        .theme-toggle-fixed {
            position: absolute;
            /* Using absolute positioning connected to wrapper instead of fixed to right corner */
            top: 0;
            right: -60px;
            /* Offset from the form container */
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .theme-toggle-fixed:hover {
            color: #64748b;
        }

        .signin-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .logo-container {
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            /* Ensure image fits nicely */
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin: 0 0 32px 0;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(226, 232, 240, 0.6);
            padding: 32px 28px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            color: #0f172a;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-input::placeholder {
            color: #cbd5e1;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            margin-top: 24px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-input {
            width: 16px;
            height: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            accent-color: #2563eb;
            margin: 0;
        }

        .checkbox-label {
            font-size: 13px;
            color: #475569;
        }

        .forgot-link {
            font-size: 13px;
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
            transition: text-decoration 0.2s;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: block;
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #f1f5f9;
        }

        .divider-text {
            padding: 0 16px;
            font-size: 12px;
            color: #64748b;
        }

        .btn-outline {
            width: 100%;
            padding: 12px;
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: block;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .footer-compliance {
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 500;
        }

        .footer-compliance .material-icons {
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="signin-wrapper">
        
        <div class="header-section">
            <div class="logo-container">
                
                <img src="./assets/images/logo.jpeg" alt="Neurovex Logo">
            </div>

            
            <button class="theme-toggle-fixed" aria-label="Toggle Theme">
                <span class="material-icons" style="font-size: 20px;">nightlight</span>
            </button>

            <h1 class="welcome-text">Welcome back</h1>
            <p class="subtitle">Access your research dashboard</p>
        </div>

        
        <div class="card">
            <form action="#">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="researcher@institute.edu" required />
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required />
                </div>

                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox-input" />
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot your password?</a>
                </div>

                
                <!-- Login Error Text -->
                <div id="login-error" style="display: none; color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 16px;">
                    Invalid credentials. Use pratik / neurovex123
                </div>

                <button type="submit" class="btn-primary"
                    onclick="handleLogin(event)">Sign In to Platform</button>

                
                <div class="divider">
                    <span class="divider-text">New to Neurovex?</span>
                </div>

                
                <button type="button" class="btn-outline" onclick="window.location.href='signup.html'">Create Researcher
                    Account</button>
            </form>
        </div>

        
        <div class="footer-compliance">
            <span class="material-icons">lock</span>
            HIPAA Compliant & End-to-End Encrypted
        </div>

    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            // Simple Auth Check
            if (email === 'pratik' && password === 'neurovex123') {
                errorDiv.style.display = 'none';
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>

</html>
